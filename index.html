<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Freelance</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #111;
      position: relative;
    }

    nav {
      display: flex;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .menu-toggle {
      display: none;
      font-size: 30px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      nav {
        position: absolute;
        top: 70px;
        right: 20px;
        background: #111;
        flex-direction: column;
        display: none;
        padding: 15px;
        border-radius: 10px;
      }

      nav a {
        margin: 10px 0;
      }

      .menu-toggle {
        display: block;
      }
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .btn {
      padding: 10px 20px;
      background: gold;
      color: black;
      border: none;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h2>Nom de la Boutique</h2>

  <div class="menu-toggle" id="menu-toggle">☰</div>

  <nav id="nav-menu">
    <a href="#services">Services</a>
    <a href="#portfolio">Réalisations</a>
    <a href="#tarifs">Tarifs</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section>
  <h1>Augmentez vos ventes</h1>
  <p>Description principale ici</p>
  <button class="btn">Commencer</button>
</section>

<section id="services">
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Service 1</div>
    <div class="card">Service 2</div>
    <div class="card">Service 3</div>
  </div>
</section>

<section id="portfolio">
  <h2>Réalisations</h2>
  <div class="cards">
    <div class="card">Projet 1</div>
    <div class="card">Projet 2</div>
  </div>
</section>

<section id="tarifs">
  <h2>Tarifs</h2>
  <div class="cards">
    <div class="card">Offre 1</div>
    <div class="card">Offre 2</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email : exemple@mail.com</p>
</section>

<a class="whatsapp" href="#">W</a>

<script>
  const toggle = document.getElementById('menu-toggle');
  const menu = document.getElementById('nav-menu');

  toggle.addEventListener('click', () => {
    if (menu.style.display === 'flex') {
      menu.style.display = 'none';
    } else {
      menu.style.display = 'flex';
    }
  });
</script>

</body>
</html>
